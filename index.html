<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Question For Meghal</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
text-align:center;
margin:0;
padding:0;
}

.container{
margin-top:120px;
}

h1{
font-size:42px;
}

p{
font-size:22px;
}

button{
padding:15px 28px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
margin:10px;
}

#startBtn{
background:#ff6b8a;
color:white;
}

#yesBtn{
background:#4CAF50;
color:white;
}

#noBtn{
background:#ff4d6d;
color:white;
position:absolute;
}

.buttons{
margin-top:40px;
position:relative;
height:200px;
}

.tabs{
margin-top:70px;
}

.tabButton{
background:#ff7a9c;
color:white;
}

.tabContent{
display:none;
font-size:20px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container" id="intro">

<h1>👋 Hello Meghal</h1>

<p>
The creator of this website wants to ask you something...
</p>

<p>
But before that — press the button below.
</p>

<button id="startBtn" onclick="startQuestion()">Continue</button>

</div>

<div class="container" id="question" style="display:none">

<h1>Important Question</h1>

<p>
Would you like to go on a fun little adventure date with me? 😊
</p>

<div class="buttons">

<button id="yesBtn" onclick="sayYes()">YES</button>

<button id="noBtn">NO</button>

</div>

<div class="tabs">

<button class="tabButton" onclick="openTab('joke')">Joke</button>
<button class="tabButton" onclick="openTab('cafe')">Cafe Idea</button>
<button class="tabButton" onclick="openTab('travel')">Travel Dream</button>

<div id="joke" class="tabContent"></div>
<div id="cafe" class="tabContent"></div>
<div id="travel" class="tabContent"></div>

</div>

</div>

<script>

function startQuestion(){

document.getElementById("intro").style.display="none"
document.getElementById("question").style.display="block"

}

function sayYes(){

document.body.innerHTML = `
<h1 style="margin-top:150px;">🎉 YAY! 🎉</h1>
<p style="font-size:28px;">Adventure date confirmed 😄</p>
<p style="font-size:22px;">Now we just need to decide where.</p>
`;

}

const noBtn=document.getElementById("noBtn");

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("touchstart",moveButton);

function moveButton(){

let x=Math.random()*window.innerWidth*0.7;
let y=Math.random()*200;

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

}

const jokes=[
"Why don't eggs tell jokes? Because they'd crack up.",
"What do you call fake spaghetti? An impasta.",
"Why did the coffee file a police report? It got mugged.",
"Why did the bicycle fall over? It was two tired."
];

const cafes=[
"Find a hidden cafe in Sydney ☕",
"Juice tasting challenge 🧃",
"Best eggs benedict hunt 🍳"
];

const travel=[
"Japan sushi adventure 🇯🇵",
"Italy pizza tour 🇮🇹",
"Bali island escape 🌴"
];

function openTab(tab){

let content="";

if(tab==="joke"){
content=jokes[Math.floor(Math.random()*jokes.length)];
}

if(tab==="cafe"){
content=cafes[Math.floor(Math.random()*cafes.length)];
}

if(tab==="travel"){
content=travel[Math.floor(Math.random()*travel.length)];
}

document.getElementById(tab).style.display="block";
document.getElementById(tab).innerText=content;

}

</script>

</body>
</html>
