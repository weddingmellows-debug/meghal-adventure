<!DOCTYPE html>
<html>

<head>

<title>Meghal's Adventure Machine</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#fbc2eb);
padding:40px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
font-size:18px;
}

.card{
background:white;
padding:35px;
border-radius:22px;
max-width:700px;
margin:auto;
box-shadow:0 10px 35px rgba(0,0,0,0.2);
}

button{
padding:15px 26px;
margin:10px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
background:#ff6f91;
color:white;
transition:0.2s;
}

button:hover{
transform:scale(1.1);
background:#ff4f7b;
}

#result{
margin-top:25px;
font-size:22px;
}

#counter{
margin-top:10px;
font-size:16px;
color:gray;
}

.wheel{
font-size:70px;
margin:20px;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.footer{
margin-top:25px;
font-size:14px;
color:gray;
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Meghal's Adventure Machine 🎉</h1>

<p>
Built specially for <b>Meghal</b> —  
Sydney explorer 🌏, travel lover ✈️,  
juice enthusiast 🧃, egg food expert 🍳.
</p>

<div class="wheel" id="wheel">🎡</div>

<button onclick="spinAdventure()">🎡 Spin Adventure</button>

<button onclick="getJoke()">😂 Random Joke</button>

<button onclick="travel()">🌍 Travel Dream</button>

<button onclick="cafe()">☕ Cafe Mission</button>

<button onclick="secret()">💖 Secret Button</button>

<div id="result"></div>

<div id="counter"></div>

<div class="footer">
Warning: excessive use may cause spontaneous adventures.
</div>

</div>

<script>

let jokesSeen = 0

const jokes = [

"Why don't eggs tell jokes? Because they'd crack up.",
"What do you call fake spaghetti? An impasta.",
"Why did the coffee file a police report? It got mugged.",
"What do you call a bear with no teeth? A gummy bear.",
"What did the ocean say to the beach? Nothing, it waved.",
"Why did the scarecrow win an award? Because he was outstanding in his field.",
"Why can't your nose be 12 inches long? Because then it would be a foot.",
"What do you call cheese that isn't yours? Nacho cheese.",
"Why did the bicycle fall over? It was two tired.",
"What did the grape do when stepped on? Nothing but let out a little wine.",
"Why did the tomato blush? Because it saw the salad dressing.",
"What do you call a lazy kangaroo? A pouch potato.",
"Why don't skeletons fight each other? They don't have the guts.",
"What did the zero say to the eight? Nice belt.",
"Why did the math book look sad? Because it had too many problems."

]

const adventures = [

"Juice tasting challenge 🧃",
"Midnight dessert hunt 🍰",
"Random beach walk 🌊",
"Try cooking eggs 3 different ways 🍳",
"Find the best cafe in Sydney ☕",
"Sunset photo mission 📸",
"Explore a place you've never been 🚶",
"Board game + snacks night 🎲"

]

const travelIdeas = [

"Japan sushi adventure 🇯🇵",
"Italy pizza tour 🇮🇹",
"Paris cafe hopping 🇫🇷",
"Bali island escape 🌴",
"Iceland northern lights ❄️",
"Greek island hopping 🇬🇷"

]

const cafes = [

"Hidden cafe exploration ☕",
"Order the weirdest juice on the menu 🧃",
"Find best eggs benedict in Sydney 🍳",
"Coffee + people watching ☕",
"Pastry tasting mission 🥐"

]

function spinAdventure(){

let wheel = document.getElementById("wheel")
wheel.style.display="block"

setTimeout(()=>{

wheel.style.display="none"

let random = adventures[Math.floor(Math.random()*adventures.length)]

document.getElementById("result").innerText =
"Adventure idea: " + random

},1200)

}

function getJoke(){

let random = jokes[Math.floor(Math.random()*jokes.length)]

jokesSeen++

document.getElementById("result").innerText = random

document.getElementById("counter").innerText =
"Jokes unlocked: " + jokesSeen

}

function travel(){

let random = travelIdeas[Math.floor(Math.random()*travelIdeas.length)]

document.getElementById("result").innerText =
"Future travel idea: " + random

}

function cafe(){

let random = cafes[Math.floor(Math.random()*cafes.length)]

document.getElementById("result").innerText =
"Cafe mission: " + random

}

function secret(){

document.getElementById("result").innerHTML =
"Important question... 👀 <br><br> Would you like to go on a small adventure with me this week?"

}

</script>

</body>
</html>
