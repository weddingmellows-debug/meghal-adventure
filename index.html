<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Meghal 🌼</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #fff8d6, #fff2a8);
    text-align:center;
}

/* HERO */
.hero {
    padding:40px 20px;
}

.hero img {
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px);}
    50% { transform: translateY(-10px);}
    100% { transform: translateY(0px);}
}

/* CARD */
.card {
    background:white;
    margin:20px auto;
    padding:20px;
    max-width:420px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* BUTTON */
button {
    padding:12px 16px;
    border:none;
    border-radius:12px;
    margin:8px;
    background:#ffe066;
    cursor:pointer;
    font-size:15px;
}

/* SLIDER */
.slider img {
    width:100%;
    border-radius:15px;
    margin-top:10px;
}

/* CHAT */
.chat {
    text-align:left;
}
.msg {
    background:#f1f1f1;
    padding:10px;
    border-radius:10px;
    margin:6px 0;
}

/* FINAL */
#yesBtn {
    background:#ffb703;
}
#noBtn {
    position:relative;
}

/* TEXT */
.small {
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <img src="photo1.jpg">
    <h2>Hey Meghal 😄</h2>
    <p class="small">This might be unnecessary… but I had to try</p>
</div>

<!-- PHOTO -->
<div class="card">
    <h3>This moment >> 😌</h3>
    <div class="slider">
        <img src="photo1.jpg">
    </div>
</div>

<!-- JOKES -->
<div class="card">
    <h3>Choose your humor 👇</h3>

    <button onclick="startJoke('good')">😂 Good</button>
    <button onclick="startJoke('lame')">😏 Lame</button>
    <button onclick="startJoke('knock')">🚪 Knock</button>

    <p id="jokeText"></p>
    <button onclick="nextJoke()">Tap for another 😂</button>
</div>

<!-- CHAT -->
<div class="card">
    <h3>Real conversation btw 😭</h3>

    <div class="chat">
        <div class="msg">I had a question…</div>
        <div class="msg">But normal people text</div>
        <div class="msg">I made a whole website 😌</div>
    </div>
</div>

<!-- DATE IDEAS -->
<div class="card">
    <h3>Pick a vibe 🌍</h3>

    <button onclick="idea('cafe')">☕ Cafe</button>
    <button onclick="idea('travel')">✈️ Travel</button>

    <p id="ideaText"></p>
</div>

<!-- FINAL -->
<div class="card">
    <h2>Okay serious question 👀</h2>
    <p>Would you go on a date with me?</p>

    <button id="yesBtn">YES 😄</button>
    <button id="noBtn">NO 🙃</button>

    <p id="finalText"></p>
</div>

<script>

/* JOKES */
let type = "";

const good = [
"Are you made of copper and tellurium? Because you're Cu-Te 😏",
"You seem like someone worth cancelling plans for",
"I had a full plan today… but something better came to mind"
];

const lame = [
"I tried to be funny… this happened 😭",
"This joke is bad… I warned you",
"I regret this already 😌"
];

const knock = [
["Knock knock","Who’s there?","Lettuce","Lettuce who?","Lettuce go out sometime 😏"]
];

function startJoke(t){
type=t;
showJoke();
}

function nextJoke(){
showJoke();
}

function showJoke(){
if(type==="good") jokeText.innerText=random(good);
if(type==="lame") jokeText.innerText=random(lame);
if(type==="knock") playKnock(random(knock));
}

function playKnock(j){
let i=0;
let int=setInterval(()=>{
jokeText.innerText=j[i];
i++;
if(i>=j.length) clearInterval(int);
},900);
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* IDEA */
const cafes = ["Juice + pancakes 🍓","Cute brunch spot ☕","Dessert + coffee 🍰"];
const travel = ["Beach walk 🌊","Mountain chill 🌄","City exploring 🗺️"];

function idea(type){
if(type==="cafe") ideaText.innerText=random(cafes);
if(type==="travel") ideaText.innerText=random(travel);
}

/* NO BUTTON MOVE */
noBtn.onmouseover = ()=>{
let x=Math.random()*200-100;
let y=Math.random()*200-100;
noBtn.style.transform=`translate(${x}px,${y}px)`;
}

/* YES */
yesBtn.onclick = ()=>{
finalText.innerText="Okay… now I actually have to plan something good 😭✨";
}

</script>

</body>
</html>
